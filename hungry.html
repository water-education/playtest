<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>Hungry Shark</title>

    <!-- If you upload a real Unity build later, change this base href -->
    <!-- <base href="https://cdn.jsdelivr.net/gh/YOUR-USERNAME/YOUR-REPO@latest/"> -->

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        #gameContainer, canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #loading-text {
            color: white;
            font-size: 48px;
            font-family: cursive;
            text-align: center;
            position: absolute;
            top: 40%;
            width: 100%;
            z-index: 10;
        }

        #sidebarad1, #sidebarad2 {
          position: fixed;
          top: 50%;
          transform: translateY(-50%);
          width: 160px;
          height: 600px;
          padding: 0;
          margin: 0;
          z-index: 999999;
        }
        #sidebarad1 { left: 0; }
        #sidebarad2 { right: 0; }

        .sidebar-close {
          position: absolute;
          top: 0;
          right: 0;
          width: 22px;
          height: 22px;
          line-height: 22px;
          text-align: center;
          background: rgba(0,0,0,0.7);
          color: #fff;
          font-size: 14px;
          cursor: pointer;
          user-select: none;
          z-index: 10;
        }
    </style>
</head>
<body>

    <div id="loading-text">LOADING HUNGRY SHARK...</div>
    <div id="gameContainer"></div>

    <!-- Sidebar ads (same as your example) -->
    <div id="sidebarad1">
      <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
    </div>
    <div id="sidebarad2">
      <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
    </div>

    <script>
        // Simple canvas Hungry Shark (Unity-style feel)
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        document.getElementById("gameContainer").appendChild(canvas);

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        let score = 0;
        let shark = { x: canvas.width/2, y: canvas.height/2, size: 45 };
        let fishList = [];
        let keys = {};

        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        // Touch support
        canvas.addEventListener("touchmove", e => {
            if (e.touches.length) {
                shark.x = e.touches[0].clientX;
                shark.y = e.touches[0].clientY;
            }
        });

        for (let i = 0; i < 30; i++) {
            fishList.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: 10 + Math.random() * 15,
                speed: 1.5 + Math.random() * 2.5
            });
        }

        function gameLoop() {
            ctx.fillStyle = "#001133";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Shark movement
            if (keys["arrowleft"] || keys["a"]) shark.x -= 9;
            if (keys["arrowright"] || keys["d"]) shark.x += 9;
            if (keys["arrowup"] || keys["w"]) shark.y -= 9;
            if (keys["arrowdown"] || keys["s"]) shark.y += 9;

            shark.x = Math.max(30, Math.min(canvas.width - 30, shark.x));
            shark.y = Math.max(30, Math.min(canvas.height - 30, shark.y));

            // Draw shark
            ctx.save();
            ctx.translate(shark.x, shark.y);
            ctx.fillStyle = "#00aaff";
            ctx.beginPath();
            ctx.moveTo(50, 0);
            ctx.lineTo(-35, -30);
            ctx.lineTo(-25, 0);
            ctx.lineTo(-35, 30);
            ctx.closePath();
            ctx.fill();

            // Eye
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(25, -10, 10, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(28, -10, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            // Fish
            for (let i = 0; i < fishList.length; i++) {
                let f = fishList[i];
                f.x -= f.speed;

                if (f.x < -50) {
                    f.x = canvas.width + 50;
                    f.y = Math.random() * canvas.height;
                }

                ctx.fillStyle = "#ffcc44";
                ctx.beginPath();
                ctx.ellipse(f.x, f.y, f.size, f.size*0.6, 0, 0, Math.PI*2);
                ctx.fill();

                // Collision
                let dx = shark.x - f.x;
                let dy = shark.y - f.y;
                if (Math.sqrt(dx*dx + dy*dy) < 55) {
                    score += 20;
                    f.x = canvas.width + 100;
                    f.y = Math.random() * canvas.height;
                }
            }

            // Score
            ctx.fillStyle = "white";
            ctx.font = "bold 32px Arial";
            ctx.fillText("Score: " + score, 30, 60);

            // Remove loading text
            if (document.getElementById("loading-text").style.opacity !== "0") {
                document.getElementById("loading-text").style.transition = "opacity 1s";
                document.getElementById("loading-text").style.opacity = "0";
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
