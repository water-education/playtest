<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Hungry Shark HTML5 build from public CDN -->
    <base href="https://cdn.jsdelivr.net/gh/Sebastian-105/Assets-105.github.io@main/hungryshark/">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>Hungry Shark</title>
    <link rel="stylesheet" href="style.css">
    <link id="-gd-engine-icon" rel="icon" type="image/png" href="favicon.png" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        #sidebarad1, #sidebarad2 {
          position: fixed; 
          top: 50%; 
          transform: translateY(-50%);
          width: 160px; 
          height: 600px; 
          padding: 0; 
          margin: 0; 
          z-index: 999999;
        }
        #sidebarad1 { left: 0; }
        #sidebarad2 { right: 0; }

        .sidebar-close {
          position: absolute; 
          top: 0; 
          right: 0; 
          width: 22px; 
          height: 22px;
          line-height: 22px; 
          text-align: center; 
          background: rgba(0,0,0,0.7);
          color: #fff; 
          font-size: 14px; 
          cursor: pointer; 
          user-select: none; 
          z-index: 10;
        }
        .sidebar-frame { 
          width: 160px; 
          height: 600px; 
          border: none; 
          display: block; 
        }

        #loading-text {
            color: white;
            font-family: cursive;
            font-size: 48px;
            text-align: center;
            margin-top: 20px;
            position: absolute;
            width: 100%;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="loading-text">LOADING HUNGRY SHARK...</div>
    <canvas id="canvas">Your browser does not support the canvas tag.</canvas>
    <noscript>Your browser does not support JavaScript.</noscript>

    <!-- Main game engine files -->
    <script src="main.js"></script>
    <script src="html5game/HungryShark.js"></script>

    <div id="status">
        <img id="status-splash" src="splash.png" alt="" style="max-width:100%;">
        <progress id="status-progress"></progress>
        <div id="status-notice"></div>
    </div>

    <!-- Sidebar ads (you can remove these if you don't want them) -->
    <div id="sidebarad1">
      <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
    </div>
    <div id="sidebarad2">
      <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
    </div>

    <script>
        console.log("Hungry Shark is loading from CDN...");
        
        // Optional: Hide loading text when game starts
        window.addEventListener("load", () => {
            setTimeout(() => {
                const loading = document.getElementById("loading-text");
                if (loading) loading.style.display = "none";
            }, 3000);
        });
    </script>
</body>
</html>
