<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>Hungry Shark</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #001122;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #003366;
        }

        #score {
            position: absolute;
            top: 15px;
            left: 20px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: cursive;
            font-size: 48px;
            text-align: center;
            z-index: 5;
        }

        #sidebarad1, #sidebarad2 {
          position: fixed; top: 50%; transform: translateY(-50%);
          width: 160px; height: 600px; padding: 0; margin: 0; z-index: 999999;
        }
        #sidebarad1 { left: 0; }
        #sidebarad2 { right: 0; }
        .sidebar-close {
          position: absolute; top: 0; right: 0; width: 22px; height: 22px;
          line-height: 22px; text-align: center; background: rgba(0,0,0,0.7);
          color: #fff; font-size: 14px; cursor: pointer; user-select: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="loading-text">LOADING HUNGRY SHARK...</div>
    <div id="score">Score: 0</div>
    <canvas id="canvas"></canvas>

    <!-- Sidebar placeholders (remove if you want) -->
    <div id="sidebarad1">
      <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
    </div>
    <div id="sidebarad2">
      <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const loadingText = document.getElementById("loading-text");

        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        // Game variables
        let score = 0;
        let shark = { x: 100, y: 300, size: 40, speed: 8 };
        let fish = [];
        let keys = {};

        // Create fish
        function createFish() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: 12 + Math.random() * 18,
                speed: 2 + Math.random() * 3,
                color: `hsl(${Math.random()*60 + 180}, 80%, 60%)`
            };
        }

        for (let i = 0; i < 25; i++) {
            fish.push(createFish());
        }

        // Controls
        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        // Touch controls for mobile
        let touchX = 0, touchY = 0;
        canvas.addEventListener("touchstart", e => {
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });
        canvas.addEventListener("touchmove", e => {
            if (e.touches.length > 0) {
                shark.x = e.touches[0].clientX - shark.size/2;
                shark.y = e.touches[0].clientY - shark.size/2;
            }
        });

        // Main game loop
        function gameLoop() {
            // Background
            ctx.fillStyle = "#001122";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Move shark with keyboard
            if (keys["arrowleft"] || keys["a"]) shark.x -= shark.speed;
            if (keys["arrowright"] || keys["d"]) shark.x += shark.speed;
            if (keys["arrowup"] || keys["w"]) shark.y -= shark.speed;
            if (keys["arrowdown"] || keys["s"]) shark.y += shark.speed;

            // Keep shark on screen
            shark.x = Math.max(shark.size/2, Math.min(canvas.width - shark.size/2, shark.x));
            shark.y = Math.max(shark.size/2, Math.min(canvas.height - shark.size/2, shark.y));

            // Draw shark (simple triangle shape)
            ctx.save();
            ctx.translate(shark.x, shark.y);
            ctx.fillStyle = "#00ccff";
            ctx.beginPath();
            ctx.moveTo(shark.size, 0);
            ctx.lineTo(-shark.size * 0.8, -shark.size * 0.7);
            ctx.lineTo(-shark.size * 0.6, 0);
            ctx.lineTo(-shark.size * 0.8, shark.size * 0.7);
            ctx.closePath();
            ctx.fill();

            // Eye
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(shark.size * 0.4, -8, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(shark.size * 0.45, -8, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Update and draw fish
            for (let i = 0; i < fish.length; i++) {
                let f = fish[i];
                f.x -= f.speed;

                // Respawn fish when off screen
                if (f.x < -50) {
                    f.x = canvas.width + 50;
                    f.y = Math.random() * canvas.height;
                }

                // Draw fish
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.ellipse(f.x, f.y, f.size, f.size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();

                // Simple tail
                ctx.beginPath();
                ctx.moveTo(f.x - f.size, f.y);
                ctx.lineTo(f.x - f.size * 1.6, f.y - 8);
                ctx.lineTo(f.x - f.size * 1.6, f.y + 8);
                ctx.fill();

                // Collision with shark
                let dx = shark.x - f.x;
                let dy = shark.y - f.y;
                let distance = Math.sqrt(dx*dx + dy*dy);

                if (distance < shark.size * 0.8 + f.size) {
                    score += 10;
                    scoreElement.textContent = `Score: ${score}`;
                    fish[i] = createFish(); // respawn eaten fish
                }
            }

            // Remove loading text after start
            if (loadingText.style.display !== "none") {
                setTimeout(() => { loadingText.style.display = "none"; }, 800);
            }

            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();

        console.log("Hungry Shark - Simple Canvas Version Loaded 🦈");
    </script>
</body>
</html>
