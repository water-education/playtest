<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playtest Lab | My Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --bg-base: #050510;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Ambient Background */
        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Game Card Styles */
        .game-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .card-img {
            width: 100%;
            height: 180px;
            background: #111;
            object-fit: cover;
        }

        .card-body {
            padding: 20px;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .card-tag {
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <header>
        <p style="color: var(--accent); font-weight: 800; letter-spacing: 4px;">PROJECTS</p>
        <h1>PLAYTEST LAB</h1>
    </header>

    <div class="game-grid">
        
        <a href="YOUR_GAME_URL_HERE" class="game-card">
            <img src="YOUR_THUMBNAIL_HERE.png" alt="Game Title" class="card-img">
            <div class="card-body">
                <div class="card-tag">Action / Sandbox</div>
                <div class="card-title">Example Game Title</div>
                <p style="font-size: 0.85rem; color: var(--text-secondary);">Brief description of the playtest or what to look for in this version.</p>
            </div>
        </a>
         <a href="YOUR_GAME_URL_HERE" class="game-card">
            <img src="YOUR_THUMBNAIL_HERE.png" alt="Game Title" class="card-img">
            <div class="card-body">
                <div class="card-tag">Action / Sandbox</div>
                <div class="card-title">Example Game Title</div>
                <p style="font-size: 0.85rem; color: var(--text-secondary);">Brief description of the playtest or what to look for in this version.</p>
            </div>
        </a>
        </div>
</div>

</body>
</html>
