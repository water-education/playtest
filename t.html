<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanuki Sunset - Optimized for Chromebook</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-L7856P3VNT');
    </script>

    <link rel="stylesheet" href="https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/TemplateData/style.css">
    <script src="https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/TemplateData/UnityProgress.js"></script>
    <script src="https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/Build/UnityLoader.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
            touch-action: none;
        }
        .webgl-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #gameContainer {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="webgl-content">
        <div id="gameContainer"></div>
    </div>

    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", 
            "https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/Build/WebGL.json", 
            {
                onProgress: UnityProgress,
                Module: {
                    onRuntimeInitialized: function () {
                        UnityProgress(gameInstance, "complete");
                    },
                    totalMemory: 1024 * 1024 * 1024,
                    canvas: document.getElementById("gameContainer")
                }
            }
        );

        // Force resize and centering
        function resizeGame() {
            if (gameInstance && gameInstance.Module && gameInstance.Module.canvas) {
                const canvas = gameInstance.Module.canvas;
                canvas.style.width = "100vw";
                canvas.style.height = "100vh";
            }
        }

        window.addEventListener('resize', resizeGame);
        window.addEventListener('load', () => {
            setTimeout(resizeGame, 500);
            setTimeout(resizeGame, 1500); // Extra safety
        });

        // Optional auto fullscreen (Chromebook friendly)
        // document.documentElement.requestFullscreen().catch(() => {});
    </script>
</body>
</html>
