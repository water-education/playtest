  body, html {
    margin: 0;

    background-color: #000;
  }

  /* Force hardware acceleration using transform, backface-visibility, and contain rules */

    width: 100vw;
    height: 100vh;
    contain: strict;
    transform: translateZ(0);
    backface-visibility: hidden;
  }

  #gameContainer {
    width: 100%;
    height: 100%;
    display: block;
  }

  #sidebarad1, #sidebarad2 {

    height: 600px;
    padding: 0;
    margin: 0;
    z-index: 9999;
    contain: layout style;
  }
  #sidebarad1 { left: 0; }

  .sidebar-close {

    top: 0;

    height: 22px;
    line-height: 22px;
    text-align: center;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 14px;
