<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Tanuki Sunset - Optimized for Chromebook</title>
    
    <!-- Basic Analytics (kept but can be removed) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-L7856P3VNT');
    </script>

    <link rel="stylesheet" href="https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/TemplateData/style.css">
    <script src="https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/TemplateData/UnityProgress.js"></script>
    <script src="https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/Build/UnityLoader.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            touch-action: none; /* Better touch handling on Chromebooks */
        }
        #gameContainer {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .webgl-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* Hide progress bar after load for cleaner look */
        #unity-progress-bar-container.complete {
            display: none;
        }
    </style>
</head>
<body>
    <div class="webgl-content">
        <div id="gameContainer"></div>
    </div>

    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", 
            "https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/Build/WebGL.json", 
            {
                onProgress: UnityProgress,
                Module: {
                    onRuntimeInitialized: function () {
                        UnityProgress(gameInstance, "complete");
                    },
                    // Performance optimizations for Chromebooks
                    print: function (text) { console.log(text); },
                    printErr: function (text) { console.error(text); },
                    // Lower memory footprint hints
                    totalMemory: 1024 * 1024 * 1024, // 1GB cap (adjust if needed)
                    // Force lower resolution on lower-end devices
                    canvas: document.getElementById("gameContainer")
                }
            }
        );

        // Chromebook-specific enhancements
        window.addEventListener('resize', () => {
            if (gameInstance && gameInstance.Module) {
                // Unity WebGL will auto-adjust, but we force refresh
                setTimeout(() => {
                    gameInstance.SendMessage('GameManager', 'OnResize'); // if your game supports it
                }, 100);
            }
        });

        // Keyboard + touch improvements
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // Allow easy exit fullscreen if needed
                if (document.fullscreenElement) document.exitFullscreen();
            }
        });

        // Optional: Auto fullscreen on load (Chromebooks handle this well)
        // document.documentElement.requestFullscreen().catch(() => {});
    </script>
</body>
</html>
