<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .webgl-content {
    width: 100vw;
    height: 100vh;
    position: absolute;
    top: 0;
    left: 0;
  }

  #gameContainer {
    width: 100% !important;
    height: 100% !important;
  }

  canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
  }
</style>

<div class="webgl-content">
    <div id="gameContainer"></div>
</div>

<script src="https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/TemplateData/UnityProgress.js"></script>
<script src="https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/Build/UnityLoader.js"></script>

<script>
  var gameInstance = UnityLoader.instantiate("gameContainer", "https://rawcdn.githack.com/Jokarcana/Tanuki-Sunset/a5b13b1279016c9bd123f06a4886b5987fa06dc5/Build/WebGL.json", {
    onProgress: UnityProgress,
    Module: {
      onRuntimeInitialized: function () {
        UnityProgress(gameInstance, "complete");
        // Force the canvas to match the container size immediately
        resizeGame();
      }
    }
  });

  // Optimization: Resize handler to keep the game fullscreen
  function resizeGame() {
    var canvas = document.querySelector('canvas');
    if (canvas) {
      canvas.style.width = "100vw";
      canvas.style.height = "100vh";
    }
  }

  window.addEventListener('resize', resizeGame);
</script>
